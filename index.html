<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Поддержка | Свяжитесь с нами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* Карточка поддержки */
        .support-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            max-width: 550px;
            width: 100%;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .support-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .support-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: gentlePulse 2s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Email блок */
        .email-container {
            background: #f9fafb;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .email-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 0.5rem;
            display: block;
        }

        .email-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .email-address {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            font-family: 'Monaco', 'Menlo', monospace;
            letter-spacing: -0.2px;
            word-break: break-all;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 0.8rem;
            border: 1px solid #e5e7eb;
            flex: 1;
        }

        /* Кнопка копирования */
        .copy-btn {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 0.6rem 1.2rem;
            border-radius: 0.8rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        /* Кнопка "Открыть в почте" */
        .open-email-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-family: inherit;
            margin-bottom: 1.2rem;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.3);
        }

        .open-email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
            filter: brightness(1.02);
        }

        .open-email-btn:active {
            transform: translateY(1px);
        }

        /* Разделитель */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #d1d5db;
            font-size: 0.8rem;
            margin: 1rem 0 1rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* Уведомление */
        .toast-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            background: rgba(31, 41, 55, 0.9);
        }

        .toast-message.show {
            opacity: 1;
        }

        /* Альтернативные ссылки */
        .alternative {
            text-align: center;
            margin-top: 1.5rem;
        }

        .alternative p {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .mail-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            border-bottom: 1px dashed #c7d2fe;
            transition: color 0.2s;
        }

        .mail-link:hover {
            color: #5a67d8;
            border-bottom-style: solid;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .support-card {
                padding: 1.8rem 1.2rem;
            }

            .email-display {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-btn {
                justify-content: center;
            }

            .email-address {
                text-align: center;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="support-card">
    <div class="header">
        <div class="support-icon">🛟💬</div>
        <h1>Центр поддержки</h1>
        <div class="subtitle">Мы здесь, чтобы помочь вам 24/7 <br> Напишите нам — ответим в ближайшее время</div>
    </div>

    <!-- Email блок с кнопкой копирования -->
    <div class="email-container">
        <span class="email-label">✉️  Электронная почта</span>
        <div class="email-display">
            <code class="email-address" id="supportEmail">anvistanb2024@gmail.com</code>
            <button class="copy-btn" id="copyEmailBtn" onclick="copyEmailToClipboard()">
                📋 Скопировать
            </button>
        </div>
    </div>

    <!-- Главная кнопка "Открыть в почте" -->
    <button class="open-email-btn" id="openMailBtn" onclick="openEmailClient()">
        ✉️  Открыть в почтовом клиенте
    </button>

    <div class="divider">или</div>

    <!-- Дополнительная ссылка для ручного копирования -->
    <div class="alternative">
        <p>Не открывается почтовый клиент?</p>
        <a href="mailto:anvistanb2024@gmail.com" class="mail-link" id="fallbackMailLink">
            anvistanb2024@gmail.com (нажмите для копирования / открытия)
        </a>
    </div>
</div>

<!-- Уведомление -->
<div id="toastMessage" class="toast-message">✅ Email скопирован!</div>

<script>
    // Основной email (меняйте на свой)
    const EMAIL = "anvistanb2024@gmail.com";

    // Функция копирования в буфер обмена
    async function copyEmailToClipboard() {
        try {
            // Современный API буфера обмена
            await navigator.clipboard.writeText(EMAIL);
            showToast("✅ Email скопирован!");
        } catch (err) {
            // Fallback для старых браузеров
            const textarea = document.createElement("textarea");
            textarea.value = EMAIL;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showToast("✅ Email скопирован (альтернативный способ)");
        }
    }

    // Функция открытия почтового клиента
    function openEmailClient() {
        // Можно добавить тему письма и тело по умолчанию
        const subject = encodeURIComponent("Вопрос / Поддержка");
        const body = encodeURIComponent("Здравствуйте! У меня есть вопрос...\n\n");
        window.location.href = `mailto:${EMAIL}?subject=${subject}&body=${body}`;
        
        // Небольшой фидбек (пользователю)
        showToast("📧 Открываем почтовую программу...", 2000);
    }

    // Функция отображения всплывающего уведомления
    let toastTimeout;
    function showToast(message, duration = 2500) {
        const toast = document.getElementById("toastMessage");
        toast.textContent = message;
        toast.classList.add("show");
        
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove("show");
        }, duration);
    }

    // Доп. элегантность: если пользователь кликает на ссылку-запасник,
    // можно предложить копирование либо стандартное поведение
    document.getElementById("fallbackMailLink")?.addEventListener("click", (e) => {
        // Не отменяем стандартное поведение полностью,
        // но добавим подсказку о копировании по двойному клику или контекстному меню
        if (!e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            copyEmailToClipboard();
            // Также откроем почтовый клиент по желанию (раскомментируйте, если нужно)
            // openEmailClient();
        }
    });

    // Добавляем всплывающую подсказку при наведении на email код
    const emailCodeElem = document.getElementById("supportEmail");
    if (emailCodeElem) {
        emailCodeElem.style.cursor = "pointer";
        emailCodeElem.title = "Нажмите, чтобы скопировать";
        emailCodeElem.addEventListener("click", copyEmailToClipboard);
    }
</script>
</body>
</html>
